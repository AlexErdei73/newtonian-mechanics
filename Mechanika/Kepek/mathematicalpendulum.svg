<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 420" width="100%" style="background-color: #ffffff;">
    <defs>
        <!-- Nyílhegyek definíciója -->
        <marker id="arrowRed" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#d32f2f" />
        </marker>
        <marker id="arrowBlue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#1976d2" />
        </marker>
        <marker id="arrowBlack" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#000000" />
        </marker>
    </defs>

    <!-- Felfüggesztés (plafon) -->
    <line x1="160" y1="50" x2="240" y2="50" stroke="#000" stroke-width="2"/>
    <line x1="165" y1="50" x2="175" y2="40" stroke="#000" stroke-width="1"/>
    <line x1="175" y1="50" x2="185" y2="40" stroke="#000" stroke-width="1"/>
    <line x1="185" y1="50" x2="195" y2="40" stroke="#000" stroke-width="1"/>
    <line x1="195" y1="50" x2="205" y2="40" stroke="#000" stroke-width="1"/>
    <line x1="205" y1="50" x2="215" y2="40" stroke="#000" stroke-width="1"/>
    <line x1="215" y1="50" x2="225" y2="40" stroke="#000" stroke-width="1"/>
    <line x1="225" y1="50" x2="235" y2="40" stroke="#000" stroke-width="1"/>

    <!-- Függőleges egyensúlyi tengely -->
    <line x1="200" y1="50" x2="200" y2="350" stroke="#999" stroke-width="1.5" stroke-dasharray="6,4" />

    <!-- Fonal (l) -->
    <line x1="200" y1="50" x2="315" y2="214" stroke="#333" stroke-width="2" />
    <text x="265" y="130" font-family="Times New Roman, serif" font-size="18" font-style="italic">l</text>

    <!-- Kötélirány meghosszabbítása a felbontáshoz -->
    <line x1="315" y1="214" x2="385.5" y2="314.8" stroke="#999" stroke-width="1.5" stroke-dasharray="4,4" />

    <!-- EGYENBŐL LEBONTOTT ERŐK (Vektorok) -->
    
    <!-- K (Kötélerő) - Felfelé a kötél mentén -->
    <line x1="315" y1="214" x2="244.5" y2="113.2" stroke="#000" stroke-width="2.5" marker-end="url(#arrowBlack)" />
    <text x="220" y="140" font-family="Times New Roman, serif" font-size="18" font-style="italic" fill="#000">K</text>

    <!-- mg (Nehézségi erő) - Függőlegesen lefelé -->
    <line x1="315" y1="214" x2="315" y2="364" stroke="#d32f2f" stroke-width="2.5" marker-end="url(#arrowRed)" />
    <text x="325" y="355" font-family="Times New Roman, serif" font-size="18" font-style="italic" fill="#d32f2f">mg</text>

    <!-- Paralellogramma a felbontáshoz -->
    <line x1="244.6" y1="263.3" x2="315" y2="364" stroke="#aaa" stroke-width="1.5" stroke-dasharray="4,4" />
    <line x1="385.5" y1="314.8" x2="315" y2="364" stroke="#aaa" stroke-width="1.5" stroke-dasharray="4,4" />

    <!-- mg * cos(phi) (Kötélirányú komponens) -->
    <line x1="315" y1="214" x2="385.5" y2="314.8" stroke="#1976d2" stroke-width="2.5" marker-end="url(#arrowBlue)" />
    <text x="395" y="325" font-family="Times New Roman, serif" font-size="18" fill="#1976d2">
        <tspan font-style="italic">mg</tspan> cos <tspan font-style="italic">φ</tspan>
    </text>

    <!-- F_t = -mg * sin(phi) (Érintőirányú komponens) -->
    <line x1="315" y1="214" x2="244.6" y2="263.3" stroke="#1976d2" stroke-width="2.5" marker-end="url(#arrowBlue)" />
    <text x="80" y="275" font-family="Times New Roman, serif" font-size="18" fill="#1976d2">
        <tspan font-style="italic">F</tspan><tspan dy="5" font-size="12">t</tspan><tspan dy="-5"> = -</tspan><tspan font-style="italic">mg</tspan> sin <tspan font-style="italic">φ</tspan>
    </text>

    <!-- Ingatest (Bob) -->
    <circle cx="315" cy="214" r="10" fill="#e0e0e0" stroke="#333" stroke-width="2" />
    <circle cx="200" cy="50" r="4" fill="#000" />

    <!-- SZÖGEK (Phi) -->
    <!-- Szög a felfüggesztésnél -->
    <path d="M 200 110 A 60 60 0 0 0 234 98" fill="none" stroke="#000" stroke-width="1.5" />
    <text x="210" y="125" font-family="Times New Roman, serif" font-size="18" font-style="italic">φ</text>

    <!-- Szög a vektorok között (mg és mg*cos(phi) között) -->
    <path d="M 315 264 A 50 50 0 0 0 343.5 254.5" fill="none" stroke="#000" stroke-width="1.5" />
    <text x="325" y="285" font-family="Times New Roman, serif" font-size="18" font-style="italic">φ</text>
</svg>