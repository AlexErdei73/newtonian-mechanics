<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="100%" height="100%">
  <defs>
    <!-- Nyílhegyek definíciója a vektorokhoz és tengelyekhez -->
    <marker id="arrow-axis" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333" />
    </marker>
    <marker id="arrow-vector-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e74c3c" />
    </marker>
    <marker id="arrow-vector-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2980b9" />
    </marker>
  </defs>

  <!-- Háttér (opcionális, most átlátszó, de adunk neki egy halvány rácsot) -->
  <rect width="600" height="400" fill="#fafafa" rx="10" />
  <g stroke="#ececec" stroke-width="1">
    <line x1="0" y1="100" x2="600" y2="100" />
    <line x1="0" y1="200" x2="600" y2="200" />
    <line x1="0" y1="300" x2="600" y2="300" />
    <line x1="150" y1="0" x2="150" y2="400" />
    <line x1="300" y1="0" x2="300" y2="400" />
    <line x1="450" y1="0" x2="450" y2="400" />
  </g>

  <!-- Referencia kör (A amplitúdó sugárral) -->
  <circle cx="300" cy="200" r="150" fill="none" stroke="#bdc3c7" stroke-width="2" stroke-dasharray="8, 4" />

  <!-- Tengelyek -->
  <line x1="50" y1="200" x2="550" y2="200" stroke="#333333" stroke-width="2" marker-end="url(#arrow-axis)" />
  <line x1="300" y1="370" x2="300" y2="30" stroke="#333333" stroke-width="2" marker-end="url(#arrow-axis)" />

  <!-- Tengely feliratok -->
  <text x="540" y="225" font-family="sans-serif" font-size="18" font-style="italic" fill="#333333">x</text>
  <text x="275" y="40" font-family="sans-serif" font-size="18" font-style="italic" fill="#333333">y</text>
  <text x="285" y="220" font-family="sans-serif" font-size="16" fill="#333333">0</text>

  <!-- Szög ív (omega * t) -->
  <path d="M 360 200 A 60 60 0 0 0 349 165" fill="none" stroke="#2c3e50" stroke-width="2" />
  <text x="370" y="185" font-family="sans-serif" font-size="16" font-style="italic" fill="#2c3e50">ωt</text>

  <!-- Pozíció vektor (Sugár = Amplitúdó) -->
  <line x1="300" y1="200" x2="422.8" y2="114" stroke="#7f8c8d" stroke-width="2" />
  <text x="345" y="145" font-family="sans-serif" font-size="18" font-style="italic" fill="#7f8c8d">A</text>

  <!-- Segédvonalak (vetítések) -->
  <!-- P pontból le az x-tengelyre -->
  <line x1="422.8" y1="114" x2="422.8" y2="200" stroke="#95a5a6" stroke-width="1.5" stroke-dasharray="5, 5" />
  <!-- Gyorsulás vektor végpontjának vetítése -->
  <line x1="342.8" y1="170" x2="342.8" y2="200" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="4, 4" />

  <!-- P pont (Körmozgás) -->
  <circle cx="422.8" cy="114" r="5" fill="#2980b9" />
  <text x="435" y="110" font-family="sans-serif" font-size="18" font-weight="bold" fill="#2980b9">P</text>

  <!-- Q pont (Rezgőmozgás az x-tengelyen) -->
  <circle cx="422.8" cy="200" r="6" fill="#27ae60" />
  <text x="430" y="225" font-family="sans-serif" font-size="18" font-weight="bold" fill="#27ae60">Q</text>

  <!-- Kitérés felirata (x) -->
  <line x1="300" y1="235" x2="422.8" y2="235" stroke="#27ae60" stroke-width="2" marker-end="url(#arrow-vector-blue)"/>
  <text x="355" y="255" font-family="sans-serif" font-size="16" font-style="italic" fill="#27ae60">x = A cos(ωt)</text>

  <!-- Vektorok: Gyorsulások -->
  <!-- Centripetális gyorsulás (P-ből az origó felé) -->
  <line x1="422.8" y1="114" x2="342.8" y2="170" stroke="#e74c3c" stroke-width="3" marker-end="url(#arrow-vector-red)" />
  <text x="365" y="130" font-family="sans-serif" font-size="18" font-style="italic" font-weight="bold" fill="#e74c3c">a<tspan baseline-shift="sub" font-size="12">cp</tspan></text>

  <!-- Harmonikus rezgőmozgás gyorsulása (x-vetület) -->
  <line x1="422.8" y1="200" x2="342.8" y2="200" stroke="#e74c3c" stroke-width="4" marker-end="url(#arrow-vector-red)" />
  <text x="360" y="190" font-family="sans-serif" font-size="18" font-style="italic" font-weight="bold" fill="#e74c3c">a<tspan baseline-shift="sub" font-size="12">x</tspan></text>

  <!-- Kiegészítő magyarázat a sarokban -->
  <rect x="20" y="320" width="230" height="60" fill="#ffffff" stroke="#bdc3c7" stroke-width="1" rx="5" />
  <text x="30" y="345" font-family="sans-serif" font-size="14" fill="#333333">
    <tspan font-weight="bold" fill="#e74c3c">a_x</tspan> az <tspan font-weight="bold" fill="#e74c3c">a_cp</tspan> vektor x-vetülete:
  </text>
  <text x="30" y="365" font-family="sans-serif" font-size="14" font-style="italic" fill="#333333">
    a<tspan baseline-shift="sub" font-size="10">x</tspan> = -a<tspan baseline-shift="sub" font-size="10">cp</tspan> · cos(ωt) = -Aω² · cos(ωt)
  </text>
</svg>