<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 550 300" width="100%" max-width="550px">
  <!-- Kifejezett fehér háttér -->
  <rect width="100%" height="100%" fill="#ffffff"/>
  
  <!-- Háromszög kitöltése (fehér) és körvonala (kék) -->
  <polygon points="50,240 250,240 250,90" fill="#ffffff" stroke="#0055cc" stroke-width="3"/>
  
  <!-- Derékszög jelölése -->
  <polyline points="230,240 230,220 250,220" fill="none" stroke="#0055cc" stroke-width="2"/>
  <circle cx="240" cy="230" r="2" fill="#0055cc"/>
  
  <!-- Alfa szög jelölése (pontosan számított ív) -->
  <path d="M 90 240 A 40 40 0 0 0 82 216" fill="none" stroke="#e60000" stroke-width="2"/>
  <text x="100" y="232" font-family="Arial" font-size="22" font-style="italic" fill="#e60000">α</text>
  
  <!-- Oldalak feliratai -->
  <text x="145" y="265" font-family="Arial" font-size="22" font-style="italic">b</text>
  <text x="265" y="170" font-family="Arial" font-size="22" font-style="italic">a</text>
  <text x="130" y="155" font-family="Arial" font-size="22" font-style="italic">c</text>
  
  <!-- *** Összefüggések (képletek) a jobb oldalon *** -->
  
  <!-- Pitagorasz-tétel -->
  <text x="300" y="65" font-family="Arial" font-size="16" font-weight="bold" fill="#333333">Pitagorasz-tétel:</text>
  <text x="300" y="95" font-family="Arial" font-size="20" font-style="italic">a² + b² = c²</text>
  
  <!-- Szögfüggvények definíciója -->
  <text x="300" y="140" font-family="Arial" font-size="16" font-weight="bold" fill="#333333">Szögfüggvények:</text>
  
  <!-- sin(alpha) = a/c -->
  <text x="300" y="185" font-family="Arial" font-size="20">
    <tspan font-style="normal">sin </tspan>
    <tspan font-style="italic" fill="#e60000">α</tspan>
    <tspan> =</tspan>
  </text>
  <text x="375" y="173" font-family="Arial" font-size="20" font-style="italic" text-anchor="middle">a</text>
  <line x1="365" y1="179" x2="385" y2="179" stroke="#000000" stroke-width="1.5"/>
  <text x="375" y="199" font-family="Arial" font-size="20" font-style="italic" text-anchor="middle">c</text>
  
  <!-- cos(alpha) = b/c -->
  <text x="420" y="185" font-family="Arial" font-size="20">
    <tspan font-style="normal">cos </tspan>
    <tspan font-style="italic" fill="#e60000">α</tspan>
    <tspan> =</tspan>
  </text>
  <text x="495" y="173" font-family="Arial" font-size="20" font-style="italic" text-anchor="middle">b</text>
  <line x1="485" y1="179" x2="505" y2="179" stroke="#000000" stroke-width="1.5"/>
  <text x="495" y="199" font-family="Arial" font-size="20" font-style="italic" text-anchor="middle">c</text>
  
  <!-- Kombinált (trigonometrikus Pitagorasz) egyenlet kiemelve -->
  <rect x="290" y="225" width="240" height="40" rx="5" fill="#e6f2ff" stroke="#0055cc" stroke-width="1"/>
  <text x="410" y="252" font-family="Arial" font-size="20" font-weight="bold" fill="#0055cc" text-anchor="middle">
    <tspan font-style="normal">sin²</tspan><tspan font-style="italic" fill="#e60000">α</tspan>
    <tspan> + cos²</tspan><tspan font-style="italic" fill="#e60000">α</tspan>
    <tspan> = 1</tspan>
  </text>
</svg>