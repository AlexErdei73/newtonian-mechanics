<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="100%" style="background-color: #ffffff;">

    <!-- Felfüggesztés (plafon) -->
    <line x1="200" y1="50" x2="300" y2="50" stroke="#000" stroke-width="2"/>
    <line x1="205" y1="50" x2="215" y2="40" stroke="#000" stroke-width="1"/>
    <line x1="225" y1="50" x2="235" y2="40" stroke="#000" stroke-width="1"/>
    <line x1="245" y1="50" x2="255" y2="40" stroke="#000" stroke-width="1"/>
    <line x1="265" y1="50" x2="275" y2="40" stroke="#000" stroke-width="1"/>
    <line x1="285" y1="50" x2="295" y2="40" stroke="#000" stroke-width="1"/>
    
    <circle cx="250" cy="50" r="4" fill="#000" />

    <!-- Függőleges egyensúlyi helyzet tengelye -->
    <line x1="250" y1="50" x2="250" y2="350" stroke="#999" stroke-width="1.5" stroke-dasharray="6,6" />
    
    <!-- Egyensúlyi állapotú ingatest (halvány) -->
    <circle cx="250" cy="300" r="10" fill="none" stroke="#aaa" stroke-width="2" stroke-dasharray="3,3" />

    <!-- Bal oldali fonal és test -->
    <line x1="250" y1="50" x2="100" y2="250" stroke="#333" stroke-width="2" />
    <circle cx="100" cy="250" r="10" fill="#e0e0e0" stroke="#333" stroke-width="2" />

    <!-- Jobb oldali fonal és test -->
    <line x1="250" y1="50" x2="400" y2="250" stroke="#333" stroke-width="2" />
    <circle cx="400" cy="250" r="10" fill="#e0e0e0" stroke="#333" stroke-width="2" />

    <!-- A fonal hossza (l) -->
    <text x="335" y="145" font-family="Times New Roman, serif" font-size="20" font-style="italic">l</text>
    <text x="155" y="145" font-family="Times New Roman, serif" font-size="20" font-style="italic">l</text>

    <!-- Szögek a felfüggesztésnél (phi mindkét oldalon) -->
    <path d="M 250 130 A 80 80 0 0 0 202 114" fill="none" stroke="#000" stroke-width="1.5" />
    <text x="215" y="145" font-family="Times New Roman, serif" font-size="20" font-style="italic">φ</text>

    <path d="M 250 130 A 80 80 0 0 1 298 114" fill="none" stroke="#000" stroke-width="1.5" />
    <text x="270" y="145" font-family="Times New Roman, serif" font-size="20" font-style="italic">φ</text>

    <!-- ==== A KÖZELÍTÉS VIZUALIZÁCIÓJA ==== -->

    <!-- Teljes húr (2x) - Egyenes, zöld szakasz a két szélső helyzet között -->
    <line x1="100" y1="250" x2="400" y2="250" stroke="#2e7d32" stroke-width="2.5" />
    
    <!-- Kis függőleges vonalka középre, hogy látszódjon a szimmetria -->
    <line x1="250" y1="245" x2="250" y2="255" stroke="#2e7d32" stroke-width="2" />
    
    <!-- "2x" felirat a húrhoz -->
    <text x="250" y="240" font-family="Times New Roman, serif" font-size="22" font-style="italic" fill="#2e7d32" text-anchor="middle">2x</text>

    <!-- Teljes ívhossz (2s) - Kék görbe -->
    <path d="M 100 250 A 250 250 0 0 0 400 250" fill="none" stroke="#1976d2" stroke-width="3" stroke-dasharray="6,4" />
    
    <!-- "2s" felirat az ívhez -->
    <text x="250" y="325" font-family="Times New Roman, serif" font-size="22" font-style="italic" fill="#1976d2" text-anchor="middle">2s</text>

    <!-- A konklúzió felirata alul -->
    <text x="250" y="365" font-family="Times New Roman, serif" font-size="22" fill="#000" text-anchor="middle">
        <tspan font-style="italic" fill="#2e7d32">2x</tspan> ≈ <tspan font-style="italic" fill="#1976d2">2s</tspan>
    </text>

</svg>