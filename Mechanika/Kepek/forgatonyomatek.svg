<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" style="background-color: #ffffff; font-family: Arial, sans-serif;">
  <!-- Definíciók a nyilakhoz -->
  <defs>
    <marker id="arrowhead-r" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#007acc" />
    </marker>
    <marker id="arrowhead-f" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e63946" />
    </marker>
  </defs>

  <!-- Rács (opcionális, segít a tájékozódásban, de most halvány) -->
  <!-- <grid ... /> kihagyva a tisztaság kedvéért -->

  <!-- Koordináták: Origo(100, 350), Támadáspont(400, 200) -->
  
  <!-- 1. Hatásvonal (Line of Action) - Szaggatott szürke -->
  <!-- Az erő függőlegesen felfelé hat, tehát a hatásvonal x=400 -->
  <line x1="400" y1="50" x2="400" y2="400" stroke="#999" stroke-width="2" stroke-dasharray="8,5" />
  <text x="410" y="380" fill="#777" font-size="14" font-style="italic">Erő hatásvonala</text>

  <!-- 2. Erőkar (k) - Zöld -->
  <!-- Merőleges távolság az origótól (100,350) a hatásvonalig (400,350) -->
  <line x1="100" y1="350" x2="400" y2="350" stroke="#2a9d8f" stroke-width="3" />
  <text x="240" y="375" fill="#2a9d8f" font-size="18" font-weight="bold">k (erőkar)</text>
  
  <!-- Merőleges jelölés az erőkarnál -->
  <polyline points="380,350 380,330 400,330" fill="none" stroke="#2a9d8f" stroke-width="1.5"/>

  <!-- 3. A test (pl. egy rúd) - Vastag szürke -->
  <line x1="100" y1="350" x2="400" y2="200" stroke="#ddd" stroke-width="15" stroke-linecap="round" />

  <!-- 4. Helyvektor (r) - Kék -->
  <line x1="100" y1="350" x2="392" y2="204" stroke="#007acc" stroke-width="3" marker-end="url(#arrowhead-r)" />
  <text x="220" y="260" fill="#007acc" font-size="18" font-weight="bold">r</text>

  <!-- 5. Forgástengely / Origo - Fekete kör -->
  <circle cx="100" cy="350" r="6" fill="#333" />
  <text x="80" y="380" fill="#333" font-size="14" font-weight="bold">Forgástengely</text>

  <!-- 6. Erő vektor (F) - Piros -->
  <!-- Támadáspontból (400, 200) felfelé mutat -->
  <line x1="400" y1="200" x2="400" y2="80" stroke="#e63946" stroke-width="4" marker-end="url(#arrowhead-f)" />
  <text x="415" y="100" fill="#e63946" font-size="20" font-weight="bold">F (erő)</text>
  <text x="415" y="200" fill="#333" font-size="14">Támadáspont</text>

  <!-- 7. Alpha szög -->
  <!-- Az r vektor meghosszabbítása a szög megjelenítéséhez -->
  <line x1="400" y1="200" x2="460" y2="170" stroke="#007acc" stroke-width="1" stroke-dasharray="4,2" opacity="0.6"/>
  
  <!-- Ív rajzolása -->
  <path d="M 440,180 A 40,40 0 0 0 400,140" fill="none" stroke="#555" stroke-width="1.5" />
  <text x="435" y="155" fill="#555" font-size="18" font-family="Times New Roman" font-style="italic">α</text>

  <!-- Képlet a sarokban -->
  <rect x="20" y="20" width="220" height="80" rx="10" fill="#f9f9f9" stroke="#ccc" />
  <text x="40" y="50" fill="#333" font-size="16" font-weight="bold">Forgatónyomaték:</text>
  <text x="40" y="80" fill="#333" font-size="18" font-family="Times New Roman" font-style="italic">M = F · k = F · r · sin(α)</text>

</svg>